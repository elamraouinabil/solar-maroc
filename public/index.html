<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Solar Maroc AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
padding:40px;
text-align:center;
background:#111827;
}

header h1{
font-size:42px;
margin-bottom:10px;
color:#22c55e;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#111827;
padding:25px;
border-radius:15px;
margin-top:20px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

input{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:8px;
font-size:16px;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:15px;
margin-top:15px;
background:#22c55e;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#16a34a;
}

#result{
margin-top:25px;
line-height:2;
font-size:17px;
}

.chatbox{
height:260px;
overflow:auto;
background:#0f172a;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

.hero{
text-align:center;
padding:60px 20px;
}

.hero h2{
font-size:34px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
color:#cbd5e1;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.stat{
background:#111827;
padding:20px;
border-radius:12px;
text-align:center;
}

.stat h3{
font-size:30px;
color:#22c55e;
}

.footer{
margin-top:40px;
padding:20px;
text-align:center;
color:#94a3b8;
}

a{
color:#22c55e;
text-decoration:none;
}

</style>

</head>

<body>

<header>

<h1>☀ Solar Maroc AI</h1>

<p>
Plateforme intelligente solaire au Maroc
</p>

</header>

<div class="hero">

<h2>
Réduisez votre facture électrique
</h2>

<p>
Simulation solaire intelligente + devis PDF + WhatsApp automatique
</p>

</div>

<div class="container">

<div class="stats">

<div class="stat">
<h3>250+</h3>
<p>Prospects</p>
</div>

<div class="stat">
<h3>98%</h3>
<p>Satisfaction</p>
</div>

<div class="stat">
<h3>40%</h3>
<p>Économie énergie</p>
</div>

</div>

<div class="card">

<h2>
⚡ Simulation solaire
</h2>

<input
id="fullname"
placeholder="Nom complet"
/>

<input
id="city"
placeholder="Ville"
/>

<input
id="phone"
placeholder="Téléphone"
/>

<input
id="bill"
placeholder="Facture électricité DH"
/>

<button onclick="simulate()">

Calculer installation

</button>

<div id="result"></div>

<a
id="whatsappBtn"
target="_blank"
>

<button>

📲 Envoyer sur WhatsApp

</button>

</a>

</div>

<div class="card">

<h2>
🤖 Chatbot IA
</h2>

<div
class="chatbox"
id="chatbox"
></div>

<input
id="msg"
placeholder="Posez une question..."
/>

<button onclick="chat()">

Envoyer

</button>

</div>

<div class="footer">

© 2026 Solar Maroc AI

</div>

</div>

<script src="app.js"></script>

</body>
</html>
